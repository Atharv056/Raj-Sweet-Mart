<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        // Set dark theme class before CSS loads to prevent white flash
        try {
            if (localStorage.getItem('theme') === 'dark') {
                document.documentElement.classList.add('dark-theme');
                document.body.classList.add('dark-theme');
            }
        } catch (e) { }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail - Raj Sweet Mart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/product-detail.css">
</head>

<body class="background-image">
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html" style="text-decoration: none; color: inherit;"><span class="logo-text">RAJ SWEET
                        MART</span></a>
            </div>

            <div class="nav-links">
                <a href="index.html" class="nav-button">Home</a>
                <a href="menu.html" class="nav-button">Menu</a>
                <a href="diwali.html" class="nav-button">Diwali-Special</a>
                <a href="contact.html" class="nav-button">Contact</a>
                <a href="order.html" class="nav-button">Order Now</a>
            </div>

            <div class="nav-right-container">
                <a href="order.html" class="nav-cart-btn">
                    <i class="fas fa-shopping-cart"></i>
                    <span>Cart</span>
                    <span id="nav-cart-count" class="nav-cart-count">0</span>
                </a>

                <!-- Theme toggle button -->
                <button class="theme-toggle-btn" id="themeToggleBtn" title="Toggle light/dark mode" type="button">
                    <i class="fas fa-moon"></i>
                </button>

                <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
                    <span id="menu-icon">☰</span>
                </button>
            </div>
        </div>

        <div class="mobile-nav" id="mobile-nav">
            <a href="index.html" class="mobile-nav-link">Home</a>
            <a href="menu.html" class="mobile-nav-link">Menu</a>
            <a href="diwali.html" class="mobile-nav-link">Diwali-Special</a>
            <a href="contact.html" class="mobile-nav-link">Contact</a>
            <a href="order.html" class="mobile-nav-link">Order Now</a>
        </div>

        <div class="mobile-nav-overlay" id="mobile-nav-overlay"></div>
    </nav>

    <div class="page-container">
        <!-- Breadcrumbs -->
        <div class="breadcrumb-nav">
            <a href="index.html">Home</a>
            <i class="fas fa-chevron-right"></i>
            <a href="menu.html">Menu</a>
            <i class="fas fa-chevron-right"></i>
            <span class="active-crumb" id="breadcrumb-product-name">Product Detail</span>
        </div>

        <div class="product-detail-container">
            <div class="product-image-section">
                <div class="image-wrapper">
                    <img id="product-img" src="" alt="Product Image">
                    <div class="veg-badge-overlay">
                        <span class="veg-dot"></span>
                    </div>
                </div>
            </div>

            <div class="product-info-section">
                <!-- Badges -->
                <div class="product-badges">
                    <span class="badge badge-veg">
                        <span class="veg-square"><span class="veg-circle"></span></span> 100% Vegetarian
                    </span>
                    <span class="badge badge-ghee">
                        <i class="fas fa-crown"></i> Premium Quality
                    </span>
                </div>

                <h1 id="product-name" class="product-name"></h1>
                <div class="product-rating">
                    <div class="stars">
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star-half-alt"></i>
                    </div>
                    <span class="rating-text">4.8 (120+ reviews)</span>
                </div>

                <p id="product-price" class="product-price"></p>
                <p class="price-subtitle">Inclusive of all taxes</p>

                <!-- Weight Presets -->
                <div class="presets-section">
                    <label class="section-label">Choose Package Size:</label>
                    <div class="preset-pills" id="preset-pills">
                        <button type="button" class="preset-pill" data-weight="250">250 g</button>
                        <button type="button" class="preset-pill" data-weight="500">500 g</button>
                        <button type="button" class="preset-pill active" data-weight="1000">1 kg</button>
                        <button type="button" class="preset-pill" data-weight="2000">2 kg</button>
                    </div>
                </div>

                <!-- Price Calculator -->
                <div class="calculator-section">
                    <div class="calculator-header">
                        <h2 class="calculator-title">
                            <i class="fas fa-balance-scale"></i> Custom Quantity Calculator
                        </h2>
                    </div>

                    <div class="input-group">
                        <label for="weight-input" id="weight-input-label">Need a custom amount? Enter weight:</label>
                        <div class="weight-input-wrapper">
                            <button type="button" class="qty-step-btn" id="qty-minus" aria-label="Decrease quantity"><i
                                    class="fas fa-minus"></i></button>
                            <input type="number" id="weight-input" min="0" step="50" value="1000"
                                placeholder="e.g. 250">
                            <button type="button" class="qty-step-btn" id="qty-plus" aria-label="Increase quantity"><i
                                    class="fas fa-plus"></i></button>
                            <div class="weight-unit-select-wrapper">
                                <select id="weight-unit-select" class="weight-unit-select">
                                    <option value="g" selected>Gram</option>
                                    <option value="kg">kg</option>
                                </select>
                            </div>

                        </div>
                    </div>

                    <div class="calculated-price">
                        <span id="calculated-price-label">Estimated Price:</span>
                        <span id="calculated-price" class="price-value">₹0</span>
                    </div>

                    <button id="custom-add-btn" class="custom-add-btn">
                        <i class="fas fa-shopping-bag"></i> Add Selected Quantity to Cart
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Floating Cart Button -->
    <a href="order.html" class="floating-cart-btn">
        <i class="fas fa-shopping-cart"></i>
        <span id="cart-item-count" class="cart-item-count">0</span>
    </a>

    <script src="/js/cart.js"></script>
    <script src="/js/product-detail.js"></script>
    <script src="/js/script.js"></script>
</body>

</html>
