<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="stylesheet" href="/css/theme.css" />
  <style>
    body { background: #f3f4f6; }
    .login-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.08);
      padding: 20px;
    }
    .login-title { font-weight: 800; color: #111827; margin: 0 0 4px 0; }
    .login-sub { color: #6b7280; margin: 0 0 12px 0; font-size: 14px; }
    .field { display: grid; gap: 6px; margin-top: 10px; }
    .field label { font-weight: 600; color: #374151; }
    .input {
      width: 100%; padding: 12px; border: 1px solid #e5e7eb; border-radius: 12px; outline: none; background: #fff;
    }
    .input:focus { border-color: #9ca3af; box-shadow: 0 0 0 4px rgba(156,163,175,.18); }
    .actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
    .btn { padding: 12px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; }
    .btn-primary { background: #111827; color: #fff; }
    .btn-secondary { background: #e5e7eb; color: #111827; }
    .msg { margin-top: 10px; font-size: 14px; }
    .switch { text-align: center; margin-top: 10px; color: #374151; font-size: 14px; }
    .switch a { color: #0ea5e9; text-decoration: none; }
    .hidden { display: none; }
    body.dark-theme { background: #0f1115; }
    body.dark-theme .login-card { background: #1b1e24; border-color: #2a2f3a; }
    body.dark-theme .login-title { color: #e5e7eb; }
    body.dark-theme .login-sub { color: #9ca3af; }
    body.dark-theme .field label { color: #e5e7eb; }
    body.dark-theme .input { background: #232833; border-color: #2a2f3a; color: #e5e7eb; }
    body.dark-theme .btn-secondary { background: #232833; color: #e5e7eb; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <h1 class="login-title">Admin Access</h1>
      <p class="login-sub">Sign in to open the dashboard</p>

      <form id="loginForm">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" class="input" type="text" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" class="input" type="password" autocomplete="current-password" required />
        </div>
        <div class="actions">
          <button class="btn btn-primary" type="submit">Sign In</button>
          <button id="toSetup" class="btn btn-secondary" type="button">First-time setup</button>
        </div>
      </form>

      <form id="setupForm" class="hidden">
        <div class="field">
          <label for="newUsername">New Username</label>
          <input id="newUsername" class="input" type="text" required />
        </div>
        <div class="field">
          <label for="newPassword">New Password</label>
          <input id="newPassword" class="input" type="password" required />
        </div>
        <div class="field">
          <label for="newPassword2">Confirm Password</label>
          <input id="newPassword2" class="input" type="password" required />
        </div>
        <div class="actions">
          <button class="btn btn-primary" type="submit">Save & Continue</button>
          <button id="cancelSetup" class="btn btn-secondary" type="button">Back to Login</button>
        </div>
      </form>

      <div id="msg" class="msg"></div>
      <div class="switch">Need to restrict access without a backend? Use this page.</div>
    </div>
  </div>
  <script>
    const loginForm = document.getElementById('loginForm');
    const setupForm = document.getElementById('setupForm');
    const toSetup = document.getElementById('toSetup');
    const cancelSetup = document.getElementById('cancelSetup');
    const msg = document.getElementById('msg');
    function show(el, on) { el.classList.toggle('hidden', !on); }
    async function sha256(str) {
      const enc = new TextEncoder().encode(str);
      const buf = await crypto.subtle.digest('SHA-256', enc);
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }
    function hasCreds() {
      return !!(localStorage.getItem('rsm_admin_user') && localStorage.getItem('rsm_admin_hash'));
    }
    if (!hasCreds()) {
      show(loginForm, false); show(setupForm, true);
    }
    toSetup.addEventListener('click', () => { show(loginForm, false); show(setupForm, true); msg.textContent = ''; });
    cancelSetup.addEventListener('click', () => { show(loginForm, true); show(setupForm, false); msg.textContent = ''; });
    setupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const u = document.getElementById('newUsername').value.trim();
      const p = document.getElementById('newPassword').value;
      const p2 = document.getElementById('newPassword2').value;
      if (!u || !p || p !== p2) { msg.textContent = 'Check username and passwords.'; msg.style.color = '#991b1b'; return; }
      const h = await sha256(u + ':' + p);
      localStorage.setItem('rsm_admin_user', u);
      localStorage.setItem('rsm_admin_hash', h);
      localStorage.setItem('rsm_admin_logged_in', 'true');
      window.location.href = 'admin.html';
    });
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      const su = localStorage.getItem('rsm_admin_user');
      const sh = localStorage.getItem('rsm_admin_hash');
      if (!su || !sh) { msg.textContent = 'Not set up. Use first-time setup.'; msg.style.color = '#92400e'; return; }
      const h = await sha256(u + ':' + p);
      if (u === su && h === sh) {
        localStorage.setItem('rsm_admin_logged_in', 'true');
        window.location.href = 'admin.html';
      } else {
        msg.textContent = 'Invalid credentials.'; msg.style.color = '#991b1b';
      }
    });
  </script>
</body>
</html>
